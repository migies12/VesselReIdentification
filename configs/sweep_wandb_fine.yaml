method: bayes
metric:
  name: aggregate_score
  goal: maximize

parameters:
  lr:
    distribution: log_uniform_values
    min: 0.00005
    max: 0.0002
  triplet_margin:
    distribution: uniform
    min: 0.1
    max: 0.5
  arcface_margin:
    distribution: uniform
    min: 0.3
    max: 0.6
  arcface_scale:
    values: [15, 30]
  loss:
    values: ["triplet", "combined"]
  triplet_weight:
    distribution: uniform
    min: 0.5
    max: 3.0
  arcface_weight:
    distribution: uniform
    min: 0.1
    max: 1.0
