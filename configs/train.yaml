seed: 1337

data:
  train_csv: data/train.csv
  val_csv: data/val.csv
  image_root: data/images/filtered
  image_size: 224
  num_workers: 8
  batch_size: 128
  use_length: true
  compute_length_stats: true
  length_mean: 221.2029
  length_std: 44.8894
  rotate: true
  crop: true
  normalize: true
  augment: true
  pk_sampler:
    enabled: true
    p: 8
    k: 4
    min_samples_per_id: 2
    batches_per_epoch: 1000

model:
  backbone: resnet50
  embedding_dim: 512
  use_length: true
  length_embed_dim: 32
  pretrained: true

train:
  epochs: 40
  lr: 0.00005
  weight_decay: 0.00001
  margin: 0.3
  loss: combined
  triplet_weight: 1.0
  triplet_warmup_epochs: 5
  triplet:
    distance: cosine
    margin: 0.1
    softplus: true
  arcface_margin: 0.5
  arcface_scale: 30.0
  arcface_weight: 1.0
  arcface_warmup_epochs: 1
  grad_clip_norm: 5.0
  log_every: 50
