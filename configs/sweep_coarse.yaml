seed: 1337

data:
  image_size: 224
  num_workers: 4
  batch_size: 64
  use_length: true
  compute_length_stats: true
  length_mean: 221.2029
  length_std: 44.8894
  rotate: false
  crop: false
  normalize: false
  augment: true
  pk_sampler:
    enabled: true
    p: 4
    k: 4
    batches_per_epoch: 50

model:
  backbone: resnet50
  embedding_dim: 512
  use_length: true
  length_embed_dim: 32
  pretrained: true

train:
  epochs: 40        # overridden by sweep.sweep_epochs during sweep
  lr: 0.00005
  weight_decay: 0.00001
  margin: 0.3
  loss: combined
  triplet_weight: 2.0
  triplet:
    distance: cosine
    margin: 0.2
    softplus: true
  arcface_margin: 0.5
  arcface_scale: 30.0
  arcface_weight: 0.5
  log_every: 50

gallery:
  image_size: 224
  use_length: true
  length_mean: 221.2029
  length_std: 44.8894

faiss:
  normalize: true

query:
  image_size: 224
  use_length: true
  length_mean: 221.2029
  length_std: 44.8894

eval:
  threshold: 0.7
  max_fpr: 0.01

sweep:
  # coarse phase: 15 epochs per trial, 40 trials max, stop if no improvement in 12
  # goal: identify which loss type, lr range, and sampling settings matter most
  # after this, use sweep_fine.yaml with narrower ranges around the best params
  sweep_epochs: 15
